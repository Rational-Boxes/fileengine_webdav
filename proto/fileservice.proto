syntax = "proto3";

package fileengine;

// File service for virtual filesystem operations
service FileService {
    // Directory operations
    rpc MakeDirectory(MakeDirectoryRequest) returns (MakeDirectoryResponse);
    rpc RemoveDirectory(RemoveDirectoryRequest) returns (RemoveDirectoryResponse);
    rpc ListDirectory(ListDirectoryRequest) returns (ListDirectoryResponse);

    // File operations
    rpc CreateFile(CreateFileRequest) returns (CreateFileResponse);
    rpc DeleteFile(DeleteFileRequest) returns (DeleteFileResponse);
    rpc UndeleteFile(UndeleteFileRequest) returns (UndeleteFileResponse);
    rpc WriteFile(WriteFileRequest) returns (WriteFileResponse);
    rpc ReadFile(ReadFileRequest) returns (ReadFileResponse);
    rpc GetFileInfo(GetFileInfoRequest) returns (GetFileInfoResponse);
    rpc FileExists(FileExistsRequest) returns (FileExistsResponse);

    // File manipulation
    rpc MoveFile(MoveFileRequest) returns (MoveFileResponse);
    rpc CopyFile(CopyFileRequest) returns (CopyFileResponse);
    rpc RenameFile(RenameFileRequest) returns (RenameFileResponse);

    // Version control
    rpc ListVersions(ListVersionsRequest) returns (ListVersionsResponse);
    rpc ReadVersion(ReadVersionRequest) returns (ReadVersionResponse);

    // Metadata operations (versioned)
    rpc SetMetadata(SetMetadataRequest) returns (SetMetadataResponse);
    rpc GetMetadata(GetMetadataRequest) returns (GetMetadataResponse);
    rpc GetAllMetadata(GetAllMetadataRequest) returns (GetAllMetadataResponse);
    rpc DeleteMetadata(DeleteMetadataRequest) returns (DeleteMetadataResponse);
    rpc GetMetadataForVersion(GetMetadataForVersionRequest) returns (GetMetadataForVersionResponse);
    rpc GetAllMetadataForVersion(GetAllMetadataForVersionRequest) returns (GetAllMetadataForVersionResponse);

    // Streaming operations for large files
    rpc WriteFileStream(stream WriteFileStreamRequest) returns (WriteFileStreamResponse);
    rpc ReadFileStream(ReadFileStreamRequest) returns (stream ReadFileStreamResponse);

    // Path resolution operations
    rpc ResolvePath(ResolvePathRequest) returns (ResolvePathResponse);

    // ACL operations
    rpc EvaluateACL(EvaluateACLRequest) returns (EvaluateACLResponse);
}

// Common types
enum ProtoFileType {
    PROTO_REGULAR_FILE = 0;
    PROTO_DIRECTORY = 1;
}

message EvaluateACLRequest {
    string uid = 1;         // Resource UUID
    AuthContext auth = 2;   // Authentication information
}

message EvaluateACLResponse {
    bool success = 1;
    string error = 2;
    repeated string permissions = 3;
}

message ProtoFileInfo {
    string uid = 1;         // UUID identifier
    string path = 2;        // Legacy path for compatibility
    string name = 3;        // Name of the file/directory
    ProtoFileType type = 4;
    int64 size = 5;
    int64 created_at = 6;  // Unix timestamp
    int64 modified_at = 7; // Unix timestamp
    string version = 8;    // Version as timestamp string (UNIX timestamp)
    string owner = 9;
    int32 permissions = 10;
}

message ProtoDirectoryEntry {
    string uid = 1;         // UUID of the entry
    string name = 2;        // Name of the entry
    ProtoFileType type = 3;
    int64 size = 4;
    int64 created_at = 5;   // Unix timestamp for creation time
    int64 modified_at = 6;  // Unix timestamp for modification time
    int32 version_count = 7; // Number of versions for files
}

// Authentication context message
message AuthContext {
    string user = 1;
    repeated string roles = 2;  // Optional: user roles for permissions
    string tenant = 3;          // Optional: tenant identifier for multitenancy
    map<string, string> claims = 4; // Optional: user claims for permissions
}

// Directory operations
message MakeDirectoryRequest {
    string parent_uid = 1;  // Parent directory UUID
    string name = 2;        // Name of the new directory
    AuthContext auth = 3;   // Authentication information
}

message MakeDirectoryResponse {
    bool success = 1;
    string error = 2;
    string uid = 3;         // UID of created directory
}

message RemoveDirectoryRequest {
    string uid = 1;         // Directory UUID to remove
    AuthContext auth = 2;   // Authentication information
}

message RemoveDirectoryResponse {
    bool success = 1;
    string error = 2;
}

message ListDirectoryRequest {
    string uid = 1;         // Directory UUID to list contents of
    AuthContext auth = 2;   // Authentication information
    bool include_deleted = 3; // Whether to include deleted files in the listing
}

message ListDirectoryResponse {
    bool success = 1;
    string error = 2;
    repeated ProtoDirectoryEntry entries = 3;
}

// File operations
message CreateFileRequest {
    string parent_uid = 1;  // Parent directory UUID
    string name = 2;        // Name of the new file
    AuthContext auth = 3;   // Authentication information
}

message CreateFileResponse {
    bool success = 1;
    string error = 2;
    string uid = 3;         // UID of created file
}

message DeleteFileRequest {
    string uid = 1;         // File UUID to delete
    AuthContext auth = 2;   // Authentication information
}

message DeleteFileResponse {
    bool success = 1;
    string error = 2;
}

message UndeleteFileRequest {
    string uid = 1;         // File UUID to undelete
    AuthContext auth = 2;   // Authentication information
}

message UndeleteFileResponse {
    bool success = 1;
    string error = 2;
}

message WriteFileRequest {
    string uid = 1;         // File UUID
    AuthContext auth = 2;   // Authentication information
    bytes data = 3;         // File content
}

message WriteFileResponse {
    bool success = 1;
    string error = 2;
}

message ReadFileRequest {
    string uid = 1;         // File UUID
    AuthContext auth = 2;   // Authentication information
}

message ReadFileResponse {
    bool success = 1;
    string error = 2;
    bytes data = 3;
}

message GetFileInfoRequest {
    string uid = 1;         // File UUID
    AuthContext auth = 2;   // Authentication information
}

message GetFileInfoResponse {
    bool success = 1;
    string error = 2;
    ProtoFileInfo info = 3;
}

message FileExistsRequest {
    string uid = 1;         // File UUID to check
    AuthContext auth = 2;   // Authentication information
}

message FileExistsResponse {
    bool success = 1;
    string error = 2;
    bool exists = 3;
}

// File manipulation
message MoveFileRequest {
    string source_uid = 1;      // Source file/directory UUID
    string destination_uid = 2; // Destination directory UUID
    AuthContext auth = 3;       // Authentication information
}

message MoveFileResponse {
    bool success = 1;
    string error = 2;
}

message CopyFileRequest {
    string source_uid = 1;      // Source file/directory UUID
    string destination_uid = 2; // Destination directory UUID
    AuthContext auth = 3;       // Authentication information
}

message CopyFileResponse {
    bool success = 1;
    string error = 2;
}

message RenameFileRequest {
    string uid = 1;         // File/directory UUID to rename
    string new_name = 2;    // New name for the file/directory
    AuthContext auth = 3;   // Authentication information
}

message RenameFileResponse {
    bool success = 1;
    string error = 2;
}

// Version control
message ListVersionsRequest {
    string uid = 1;         // File UUID
    AuthContext auth = 2;   // Authentication information
}

message ListVersionsResponse {
    bool success = 1;
    string error = 2;
    repeated string versions = 3;  // String timestamps instead of integers
}

message ReadVersionRequest {
    string uid = 1;              // File UUID
    string version_timestamp = 2; // Version timestamp string
    AuthContext auth = 3;        // Authentication information
}

message ReadVersionResponse {
    bool success = 1;
    string error = 2;
    bytes data = 3;
}

// Streaming operations
message WriteFileStreamRequest {
    oneof request {
        WriteFileStreamMetadata metadata = 1;
        bytes chunk = 2;
    }
}

message WriteFileStreamMetadata {
    string uid = 1;
    AuthContext auth = 2;
}

message WriteFileStreamResponse {
    bool success = 1;
    string error = 2;
}

message ReadFileStreamRequest {
    string uid = 1;
    AuthContext auth = 2;
}

message ReadFileStreamResponse {
    bytes chunk = 1;
}

// Metadata operations
message SetMetadataRequest {
    string uid = 1;
    string key = 2;
    string value = 3;
    AuthContext auth = 4;
}

message SetMetadataResponse {
    bool success = 1;
    string error = 2;
}

message GetMetadataRequest {
    string uid = 1;
    string key = 2;
    AuthContext auth = 3;
}

message GetMetadataResponse {
    bool success = 1;
    string error = 2;
    string value = 3;
}

message MetadataEntry {
    string key = 1;
    string value = 2;
}

message GetAllMetadataRequest {
    string uid = 1;
    AuthContext auth = 2;
}

message GetAllMetadataResponse {
    bool success = 1;
    string error = 2;
    repeated MetadataEntry metadata = 3;
}

message DeleteMetadataRequest {
    string uid = 1;
    string key = 2;
    AuthContext auth = 3;
}

message DeleteMetadataResponse {
    bool success = 1;
    string error = 2;
}

message GetMetadataForVersionRequest {
    string uid = 1;
    int32 version = 2;
    string key = 3;
    AuthContext auth = 4;
}

message GetMetadataForVersionResponse {
    bool success = 1;
    string error = 2;
    string value = 3;
}

message GetAllMetadataForVersionRequest {
    string uid = 1;
    int32 version = 2;
    AuthContext auth = 3;
}

message GetAllMetadataForVersionResponse {
    bool success = 1;
    string error = 2;
    repeated MetadataEntry metadata = 3;
}

// Path resolution
message ResolvePathRequest {
    string path = 1;          // Absolute path to resolve
    AuthContext auth = 2;     // Authentication information
}

message ResolvePathResponse {
    bool success = 1;
    string error = 2;
    string uid = 3;           // UUID of the resolved resource
    ProtoFileType type = 4;   // Type of the resolved resource
}